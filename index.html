<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>TaskKeeper</title>
        <link rel="stylesheet" href="./src/styles.css">
        <script type="module" src="./src/main.ts"></script>
        <meta name="viewport" content="width=device-width, user-scalable=no viewport-fit=cover">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eff1f5">
        <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1e2e">
        <link rel="icon" href="./src/assets/favicon.png" type="image/png">
    </head>
    <body>

        <div class="panel" id="primary-panel">
            <div id="top-bar" class="bar">
                <div id="title-box">
                    <div id='app-icon'></div>
                    <h1 id='title-text'>TaskKeeper</h1>
                </div>
                <!-- <div class="button-panel"> -->
                <!--     <button id='start' class="left right">New Room...</button> -->
                <!--     <button id='leave' class="right square  hidden"></button> -->
                <!-- </div> -->
            </div>
            <div id="status-bar" class="bar">
                <div class="toast-block">
                    <p class="toast-label">Warning!</p>
                    <p class="toast-content">Please ensure javascript is enabled!</p>
                </div>
            </div>
        </div>

        <main>
            <div id="task-container"></div>
        </main>

        <dialog id="task-dialog">
            <form id="task-form">
                <h2 id="task-form-title">New task</h2>

                <label for="task-title-input">Title</label>
                <input id="task-title-input" name="title" type="text" maxlength="80" autocomplete="off" required>

                <label for="task-description-input">Description</label>
                <textarea id="task-description-input" name="description" maxlength="500" rows="5"></textarea>

                <div class="dialog-actions">
                    <button id="task-form-cancel" type="button">Cancel</button>
                    <button id="task-form-submit" type="submit">Save</button>
                </div>
            </form>
        </dialog>

        <div id="toast">
            <div id="toast-icon"></div>
            <span id="toast-text"></span>
        </div>
    </body>
</html>
